header:
  version: 14

machine: qemuarm64
distro: companydistro

repos:
  bitbake:
    url: "https://git.openembedded.org/bitbake"
    branch: "2.8"
    path: "sources/bitbake"
    layers: {}

  openembedded-core:
    url: "https://git.openembedded.org/openembedded-core"
    branch: "scarthgap"
    path: "sources/openembedded-core"
    layers:
      meta:

  meta-openembedded:
    url: "https://git.openembedded.org/meta-openembedded"
    branch: "scarthgap"
    path: "sources/meta-openembedded"
    layers:
      meta-oe:
      meta-python:
      meta-networking:
      meta-filesystems:

  meta-virtualization:
    url: "https://git.yoctoproject.org/meta-virtualization"
    branch: "scarthgap"
    path: "sources/meta-virtualization"
    layers:
      .:

  meta-company:
    path: "/yocto-workspace/meta-company"

target:
  - company-image

local_conf_header:

  cache: |
    DL_DIR = "/yocto-cache/downloads"
    SSTATE_DIR = "/yocto-cache/sstate"

  performance: |
    BB_NUMBER_THREADS = "8"
    PARALLEL_MAKE = "-j8"

  distro: |
    PACKAGE_CLASSES = "package_ipk"

    INIT_MANAGER = "systemd"

    DISTRO_FEATURES += "systemd"

    VIRTUAL-RUNTIME_init_manager = "systemd"

    EXTRA_IMAGE_FEATURES = ""

    USER_CLASSES ?= "buildstats"

    PATCHRESOLVE = "noop"

    INHERIT += "rm_work"